<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>conalturavisualfpv</title>
  <meta name="description" content="Portfolio visual FPV de conalturavisualfpv: fotos, videos y motivación.">
  <meta name="keywords" content="FPV, fotografía, videos, branding, motivación, conalturavisualfpv">
  <meta name="author" content="Pablo - conalturavisualfpv">
  <style>
    /* Cursor personalizado con dron */
    body {
      cursor: url('dron.png') 16 16, auto;
      font-family: 'Noto Serif', serif;
      margin: 0;
      background: url('foto1.png') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      position: relative;
      line-height: 1.6;
      font-size: 1.1rem;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    /* Encabezado extendido */
    .hero-header {
      text-align: center;
      background: linear-gradient(to bottom, #000, #111);
      padding: 3rem 1rem;
      border-bottom: 3px solid gold;
      animation: fadeIn 2s ease-in-out;
    }

    .logo-fpv {
      height: 180px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 15px gold);
      animation: glow 3s infinite alternate;
    }

    .hero-header h1 {
      color: gold;
      font-size: 3rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 10px gold, 0 0 20px #fff;
      animation: glowText 3s infinite alternate;
    }

    .hero-header p {
      color: #fff;
      font-style: italic;
      font-size: 1.3rem;
      margin-top: 0.5rem;
    }

    .hero-header nav a {
      color: gold;
      margin: 0 1rem;
      text-decoration: none;
      font-weight: bold;
      opacity: 0;
      transform: translateY(20px);
      animation: slideIn 0.8s forwards;
    }

    .hero-header nav a:nth-child(1) { animation-delay: 0.5s; }
    .hero-header nav a:nth-child(2) { animation-delay: 0.8s; }
    .hero-header nav a:nth-child(3) { animation-delay: 1.1s; }
    .hero-header nav a:nth-child(4) { animation-delay: 1.4s; }

    .hero-header nav a:hover {
      color: #fff;
      text-shadow: 0 0 8px gold;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px gold); }
      to { filter: drop-shadow(0 0 25px #fff); }
    }

    @keyframes glowText {
      from { text-shadow: 0 0 10px gold; }
      to { text-shadow: 0 0 20px #fff; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Galería */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .gallery img, .gallery video {
      width: 100%;
      border-radius: 8px;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 8px;
    }

    .video-container iframe,
    .video-container blockquote {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* FAQ */
    .faq {
      max-width: 600px;
      margin: auto;
    }
    .faq h3 {
      color: gold;
    }

    /* Contacto */
    #contacto {
      background: rgba(0, 0, 0, 0.7);
      padding: 2rem;
      border-radius: 10px;
      max-width: 600px;
      margin: 3rem auto;
      color: #fff;
    }

    #contacto h2 {
      color: gold;
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 2rem;
    }

    #contacto input,
    #contacto textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 2px solid gold;
      border-radius: 6px;
      background: #111;
      color: #fff;
      font-family: 'Noto Serif', serif;
    }

    #contacto input:focus,
    #contacto textarea:focus {
      outline: none;
      border-color: #fff;
      background: #222;
    }

    #contacto button {
      background: gold;
      color: #000;
      font-weight: bold;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    #contacto button::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: all 0.5s ease;
    }

    #contacto button:hover::after {
      left: 100%;
    }

    #contacto button:hover {
      background: #fff;
      color: #000;
    }

    #contacto a {
      color: gold;
      font-weight: bold;
      text-decoration: none;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    #contacto a:hover {
      color: #fff;
      text-shadow: 0 0 8px gold;
    }

    /* Footer */
    footer {
      background: #111;
      text-align: center;
      padding: 2rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .logo-fpv {
        height: 120px;
      }
      .hero-header h1 {
        font-size: 2rem;
      }
      .hero-header p {
        font-size: 1rem;
      }
      .hero-header nav a {
        display: block;
        margin: 0.5rem 0;
      }
      section {
        padding: 1.5rem;
      }
      iframe {
        width: 100% !important;
        height: auto !important;
      }
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
